name: Auto Sign In

on:
  schedule:
    # 每天 UTC 00:00 (北京时间 08:00) 执行
    - cron: '0 0 * * *'
  # 支持手动触发
  workflow_dispatch:

jobs:
  sign-in:
    runs-on: ubuntu-22.04
    
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4
      
      - name: 🐍 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: 📦 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests
      
      - name: 🎯 执行自动签到
        env:
          COOKIE_520: ${{ secrets.COOKIE_520 }}
        run: |
          echo "🚀 开始执行自动签到..."
          python auto_sign.py
