name: Update README Timestamp

on:
  schedule:
    - cron: "0 0 1 * *"   # 每月1号
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Update timestamp
        run: |
          DATE=$(date +'%Y-%m-%d')

          sed -i "s/<!--LAST_ACTIVE-->.*<!--END_LAST_ACTIVE-->/<!--LAST_ACTIVE-->$DATE<!--END_LAST_ACTIVE-->/" readme.md

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add README.md

          git diff --quiet && git diff --staged --quiet || \
          git commit -m "docs: update last active date"

          git push
